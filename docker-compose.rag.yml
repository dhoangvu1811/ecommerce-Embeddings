# Local stack: Qdrant + n8n for RAG chatbox (Ollama runs on host — see README)
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ecommerce-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  n8n:
    image: n8nio/n8n:1.70.4
    container_name: ecommerce-n8n
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  n8n_data:
